<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #111; /* Dark background */
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      
      .clip {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      #title-container {
        font-size: 120px;
        color: #fff;
        font-weight: bold;
        text-shadow: 0 10px 20px rgba(0,0,0,0.5);
      }
      
      #subtitle {
        font-size: 64px;
        color: #4CAF50;
        margin-top: 40px;
      }
      
      .word {
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="5"
      data-width="1920"
      data-height="1080"
    >
      <div id="scene1" class="clip" data-start="0" data-duration="5" data-track-index="1">
        <div id="title-container">
          <span class="word">VideoForge</span>
        </div>
        <div id="subtitle"> Phase 1 Render Test </div>
      </div>
    </div>

    <script>
      // The timeline must be exported here for HyperFrames to pick it up
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      
      // Animate the title flying in
      tl.from("#title-container .word", { 
          opacity: 0, 
          y: 100, 
          rotationX: 90, 
          duration: 1, 
          ease: "back.out(1.7)" 
      }, 0.5);
      
      // Animate the subtitle fading in
      tl.from("#subtitle", { 
          opacity: 0, 
          scale: 0.5, 
          duration: 0.8, 
          ease: "power2.out" 
      }, 1.0);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
