<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="./data.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      
      #root {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .media-wrapper {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 1;
      }

      .bg-media {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.6);
      }

      .subtitle-container {
        position: absolute;
        bottom: 8%;
        left: 10%;
        right: 10%;
        min-height: 120px;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 20px;
        z-index: 10;
      }
      
      .subtitle-text {
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        transform: translateY(-50%);
        margin: 0;
        padding: 0 40px;
        box-sizing: border-box;
        font-size: 3em;
        font-weight: bold;
        color: white;
        text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        text-align: center;
      }
      
      .title-screen {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #111;
        color: white;
        font-size: 100px;
        font-weight: bold;
        z-index: 20;
        text-align: center;
        padding: 100px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-width="1920"
      data-height="1080"
    >
      <!-- JS 会在这里动态生成内容 -->
    </div>

    <script>
      const data = window.__VIDEOFORGE_DATA__ || { title: "Title", scenes: [], total_duration: 5 };
      const totalDuration = data.total_duration + 3; // 留3秒片头
      document.getElementById('root').setAttribute('data-duration', totalDuration);

      const root = document.getElementById('root');
      
      // 1. 生成片头 — 作为 HyperFrames clip
      const titleScreen = document.createElement('div');
      titleScreen.className = 'title-screen clip';
      titleScreen.id = 'title-screen';
      titleScreen.setAttribute('data-start', '0');
      titleScreen.setAttribute('data-duration', '3');
      titleScreen.setAttribute('data-track-index', '10');
      titleScreen.innerText = data.title;
      root.appendChild(titleScreen);

      // 2. 创建唯一的 Master Video 元素 (使用 H.264 MP4 格式以提升渲染性能)
      const videoWrapper = document.createElement('div');
      videoWrapper.className = 'media-wrapper clip';
      videoWrapper.id = 'video-wrapper';
      videoWrapper.setAttribute('data-start', '3.0');
      videoWrapper.setAttribute('data-duration', String(data.total_duration));
      videoWrapper.setAttribute('data-track-index', '0');

      const video = document.createElement('video');
      video.className = 'bg-media clip';
      video.id = 'bg-video';
      video.src = 'assets/concat_master.mp4';
      video.muted = true;
      video.preload = 'auto';
      video.setAttribute('playsinline', '');
      video.setAttribute('data-start', '3.0');
      video.setAttribute('data-duration', String(data.total_duration));
      video.setAttribute('data-track-index', '0');
      videoWrapper.appendChild(video);
      root.appendChild(videoWrapper);

      // 3. 生成各个 Scene 的字幕元素
      let current_time = 3.0; // 视频内容从第3秒开始

      data.scenes.forEach(scene => {
        // 字幕容器 — 作为 clip
        if (scene.words && scene.words.length > 0) {
          const subContainer = document.createElement('div');
          subContainer.className = 'subtitle-container clip';
          subContainer.id = `sub-container-${scene.index}`;
          subContainer.setAttribute('data-start', String(current_time));
          subContainer.setAttribute('data-duration', String(scene.duration));
          subContainer.setAttribute('data-track-index', '2');
          
          scene.words.forEach((wordObj, wIdx) => {
            const p = document.createElement('p');
            p.className = 'subtitle-text';
            p.textContent = wordObj.word;
            p.id = `word-${scene.index}-${wIdx}`;
            p.style.opacity = '0';
            subContainer.appendChild(p);
          });
          root.appendChild(subContainer);
        }

        current_time += scene.duration;
      });

      // 4. 构建 GSAP 时间轴 — 仅做纯动画效果，不控制显隐
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // 强制让 GSAP 时间轴长度与总时长对齐，防止黑帧
      tl.to({}, { duration: totalDuration }, 0);

      // 片头动画 (0~3秒)
      tl.from('#title-screen', { opacity: 0, scale: 0.8, duration: 1 }, 0);
      tl.to('#title-screen', { opacity: 0, scale: 1.2, duration: 1 }, 2);

      // 场景动画
      let anim_time = 3.0;

      data.scenes.forEach(scene => {
        // 动画作用在唯一的背景容器 #video-wrapper 上，逐场景进行缩放动画
        tl.fromTo('#video-wrapper', 
          { scale: 1.0 }, 
          { scale: 1.15, duration: scene.duration, ease: "none" }, 
          anim_time
        );

        // 字幕淡入淡出动画
        if (scene.words && scene.words.length > 0) {
          scene.words.forEach((wordObj, wIdx) => {
            const absoluteStart = anim_time + wordObj.start;
            const absoluteEnd = anim_time + wordObj.end;
            const pId = `#word-${scene.index}-${wIdx}`;
            
            tl.to(pId, { opacity: 1, duration: 0.15 }, absoluteStart);
            tl.to(pId, { opacity: 0, duration: 0.15 }, absoluteEnd);
          });
        }
        
        anim_time += scene.duration;
      });

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
