name: 🐛 Bug Report
description: Report a bug to help us improve
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug
      placeholder: When running demo_salt_dissolve.py, it crashes at the TTS stage...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Please provide minimal steps to reproduce the issue
      placeholder: |
        1. Install dependencies `pip install -e .`
        2. Configure .env file
        3. Run `python demo_salt_dissolve.py`
        4. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Please include error logs.
      placeholder: |
        ```
        Traceback (most recent call last):
          File "...", line X, in ...
        ```
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 11
        - Windows 10
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Ubuntu 22.04
        - Ubuntu 20.04
        - Other Linux
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: Run `python --version` to check
      placeholder: "3.11.5"
    validations:
      required: true

  - type: input
    id: videoforge-version
    attributes:
      label: VideoForge Version
      description: Run `pip show videoforge` or check pyproject.toml
      placeholder: "0.5.0"
    validations:
      required: true

  - type: checkboxes
    id: components
    attributes:
      label: Affected Components
      description: Select the components related to this issue
      options:
        - label: ScriptWriter
        - label: TTS (Text-to-Speech)
        - label: TimestampAlign (WhisperX)
        - label: AssetSearch
        - label: AssetTag (CLIP/Gemini)
        - label: VideoRender (HyperFrames)
        - label: ResourceLibrary
        - label: CLI
        - label: Other

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Any other context that might help (screenshots, config, etc.)
